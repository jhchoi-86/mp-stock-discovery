services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: mp-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mp_stock}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  # ============================================================================
  # Redis Cache & Message Queue
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: mp-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  # ============================================================================
  # Node.js Backend Server with Hot Reload
  # ============================================================================
  backend:
    image: mp-stock:latest
    container_name: mp-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-mp_stock}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      TZ: Asia/Seoul
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_key_12345_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_key_12345_change_in_production}
      CORE_INTEGRITY_HASH: ${CORE_INTEGRITY_HASH:-dev_integrity_hash_12345}
    ports:
      - "3001:3001"
    volumes:
      # Bind mount for source code (hot reload)
      - ./src:/app/src
      - ./lib:/app/lib
      - ./platform:/app/platform
      - ./server.cjs:/app/server.cjs
      - ./analyzer.cjs:/app/analyzer.cjs
      # Persistent data
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - mp-network
    restart: unless-stopped
    # Development mode - run with nodemon for auto-reload
    command: npx nodemon --exec "node" server.cjs --legacy-peer-deps
    develop:
      watch:
        # Watch source files and restart
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./lib
          target: /app/lib
        - action: sync
          path: ./platform
          target: /app/platform
        - action: sync
          path: ./server.cjs
          target: /app/server.cjs
        - action: sync
          path: ./analyzer.cjs
          target: /app/analyzer.cjs
        
        # Rebuild on dependency changes
        - action: rebuild
          path: ./package.json

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mp-network:
    driver: bridge
