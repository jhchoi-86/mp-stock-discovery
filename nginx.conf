# /etc/nginx/sites-available/mp-stock-discovery

server {
    listen 80;
    server_name mp-stock.duckdns.org; # Replace with your domain if acquired later

    # Serve the React Frontend
    # MAKE SURE THIS PATH MATCHES THE ACTUAL EC2 DEPLOYMENT DIRECTORY
    root /home/ubuntu/mp-stock-discovery/dist;
    index index.html index.htm;

    # Gzip Compression for Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Main Route: Fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy Route (Redirecting /api to Node.js / Express Server running on PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Preserve original client IP for security layers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE (Server-Sent Events) Real-time streams
        # Note: If SSE streams still disconnect, uncomment the below lines:
        # proxy_set_header Connection '';
        # chunked_transfer_encoding off;
        # proxy_buffering off;
        # proxy_cache off;
    }
}
